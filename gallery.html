<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>อัลบัมภาพ · MCCMU</title>
<link rel="stylesheet" href="assets/mccmu.css">
</head>
<body data-page="gallery">
<div id="site-nav"></div>

<section class="phero">
  <div class="phero__pat"></div>
  <div class="container">
    <div class="crumbs"><a href="index.html">หน้าแรก</a><span>/</span><span>อัลบัมภาพ</span></div>
    <span class="eyebrow">ความทรงจำของเรา <span class="en">Gallery</span></span>
    <h1>อัลบัมภาพถ่าย</h1>
    <p class="lead">รวมภาพความทรงจำจากกิจกรรมต่าง ๆ ของชมรม
      ทุกภาพคือเรื่องราวของมิตรภาพและศรัทธาที่เราสร้างร่วมกัน</p>
  </div>
</section>

<section class="section" style="padding-top:54px">
  <div class="container">
    <div class="tabs reveal" id="galTabs">
      <button class="tab active" data-f="all">ทั้งหมด</button>
      <button class="tab" data-f="ศาสนา">กิจกรรมศาสนา</button>
      <button class="tab" data-f="อาสา">ค่าย / อาสา</button>
      <button class="tab" data-f="สังสรรค์">พบปะสังสรรค์</button>
    </div>
    <div class="masonry reveal" id="gal"></div>
  </div>
</section>

<!-- lightbox -->
<div class="lightbox" id="lb">
  <button class="lb-close" id="lbClose" aria-label="ปิด">&times;</button>
  <div class="lb-stage"><div class="ph" id="lbImg" style="width:min(80vw,720px);aspect-ratio:4/3;border-radius:14px"></div>
    <div class="lb-cap" id="lbCap"></div></div>
</div>

<div id="site-footer"></div>

<style>
.gtile{ cursor:pointer;position:relative; }
.gtile .ph{ width:100%; }
.gtile::after{ content:"";position:absolute;inset:0;background:linear-gradient(transparent 55%,rgba(42,15,92,.55));opacity:0;transition:opacity .2s;border-radius:14px; }
.gtile:hover::after{ opacity:1; }
.gtile .gcap{ position:absolute;left:14px;bottom:12px;color:#fff;font-family:var(--font-display);font-weight:600;font-size:14.5px;
  opacity:0;transform:translateY(6px);transition:.2s;z-index:2;text-shadow:0 1px 4px rgba(0,0,0,.4); }
.gtile:hover .gcap{ opacity:1;transform:none; }
.gtile.hide{ display:none; }
.lightbox{ position:fixed;inset:0;z-index:100;background:rgba(27,11,59,.86);backdrop-filter:blur(6px);
  display:none;place-items:center; }
.lightbox.open{ display:grid; }
.lb-stage{ text-align:center; }
.lb-cap{ color:#e7ddfb;font-family:var(--font-display);font-size:16px;margin-top:16px; }
.lb-close{ position:absolute;top:22px;right:26px;width:46px;height:46px;border-radius:50%;border:none;
  background:rgba(255,255,255,.12);color:#fff;font-size:26px;cursor:pointer;line-height:1; }
.lb-close:hover{ background:rgba(255,255,255,.22); }
</style>
<script>
(function(){
  var icon='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.3"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.6"/><path d="M21 16l-5-5L5 19"/></svg>';
  var data=[
    {c:'ศาสนา',cap:'ละหมาดญะมาอะห์ร่วมกัน',ar:'4/5'},
    {c:'สังสรรค์',cap:'เปิดบ้านต้อนรับน้องใหม่',ar:'4/3'},
    {c:'อาสา',cap:'ค่ายอาสาพัฒนาชุมชน',ar:'1/1'},
    {c:'ศาสนา',cap:'ละศีลอดเดือนรอมฎอน',ar:'4/3'},
    {c:'สังสรรค์',cap:'กิจกรรมสานสัมพันธ์',ar:'3/4'},
    {c:'อาสา',cap:'เลี้ยงอาหารเด็กกำพร้า',ar:'4/3'},
    {c:'ศาสนา',cap:'ฮาลาเกาะฮ์ประจำสัปดาห์',ar:'1/1'},
    {c:'สังสรรค์',cap:'ทริปเที่ยวปลายภาค',ar:'4/5'},
    {c:'อาสา',cap:'ปลูกป่ารักษ์สิ่งแวดล้อม',ar:'4/3'},
    {c:'ศาสนา',cap:'อบรมการอ่านอัลกุรอาน',ar:'3/4'},
    {c:'สังสรรค์',cap:'กีฬาสานสัมพันธ์',ar:'4/3'},
    {c:'อาสา',cap:'ซ่อมแซมมัสยิดชุมชน',ar:'1/1'}
  ];
  var gal=document.getElementById('gal');
  gal.innerHTML=data.map(function(d,i){
    return '<div class="gtile" data-cat="'+d.c+'" data-cap="'+d.cap+'"><div class="ph" data-label="'+d.cap+'" style="aspect-ratio:'+d.ar+'">'+icon+'</div><span class="gcap">'+d.cap+'</span></div>';
  }).join('');

  var tabs=document.getElementById('galTabs');
  var tiles=[].slice.call(gal.querySelectorAll('.gtile'));
  tabs.addEventListener('click',function(e){
    var b=e.target.closest('.tab'); if(!b)return;
    tabs.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
    b.classList.add('active'); var f=b.getAttribute('data-f');
    tiles.forEach(function(c){ c.classList.toggle('hide', f!=='all' && c.getAttribute('data-cat')!==f); });
  });

  var lb=document.getElementById('lb'), lbCap=document.getElementById('lbCap'), lbImg=document.getElementById('lbImg');
  gal.addEventListener('click',function(e){
    var t=e.target.closest('.gtile'); if(!t)return;
    lbCap.textContent=t.getAttribute('data-cap');
    lbImg.setAttribute('data-label',t.getAttribute('data-cap'));
    lbImg.innerHTML=icon;
    lb.classList.add('open');
  });
  function close(){ lb.classList.remove('open'); }
  document.getElementById('lbClose').addEventListener('click',close);
  lb.addEventListener('click',function(e){ if(e.target===lb)close(); });
  document.addEventListener('keydown',function(e){ if(e.key==='Escape')close(); });
})();
</script>
<script src="assets/site.js"></script>
</body>
</html>
